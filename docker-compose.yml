services:
  analytics-api:
    build: ./analytics-api
    ports:
      - "${ANALYTICS_PORT:-8001}:8001"
    environment:
      - ANALYTICS_PORT=8001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  health-checker:
    build: ./health-checker
    ports:
      - "${CHECKER_PORT:-8002}:8002"
    environment:
      - CHECKER_PORT=8002
      - ANALYTICS_URL=http://analytics-api:8001
      - GATEWAY_URL=http://api-gateway:8000
    depends_on:
      analytics-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  api-gateway:
    build: ./api-gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - GATEWAY_PORT=8000
      - ANALYTICS_URL=http://analytics-api:8001
      - CHECKER_URL=http://health-checker:8002
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      analytics-api:
        condition: service_healthy
      health-checker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
